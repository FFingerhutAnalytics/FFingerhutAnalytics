<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%">
  <style>
    /* Die Wellen-Animation */
    .wave1 {
      animation: moveWave 8s linear infinite;
    }
    .wave2 {
      animation: moveWave 12s linear infinite reverse;
    }
    @keyframes moveWave {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    /* Der statische Text */
    .text {
      font-family: 'Segoe UI', Ubuntu, Sans-Serif;
      font-weight: 800;
      fill: #ffffff;
    }
  </style>

  <rect width="100%" height="100%" fill="#0d1117"/>

  <g class="wave1" opacity="0.4">
    <path d="M 0,180 Q 200,130 400,180 T 800,180 T 1200,180 T 1600,180 L 1600,250 L 0,250 Z" fill="#007acc"/>
  </g>
  <g class="wave2" opacity="0.3">
    <path d="M 0,190 Q 200,230 400,190 T 800,190 T 1200,190 T 1600,190 L 1600,250 L 0,250 Z" fill="#00ffcc"/>
  </g>

  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" font-size="65" class="text">Frederik Fingerhut</text>
</svg>
